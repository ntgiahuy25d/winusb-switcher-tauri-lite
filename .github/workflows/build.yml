# Tag + manual builds that publish one GitHub Release (Electron-style: build matrix → single release job).
# Does not replace ci.yml (PR / main smoke tests). Settings → Actions → Workflow permissions → Read and write.
name: Build WinUSB Switcher Lite

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build & package (Windows)
        run: yarn tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-windows
          path: |
            src-tauri/target/release/bundle/nsis/
            src-tauri/target/release/bundle/msi/
          if-no-files-found: warn
          retention-days: 14

  # GitHub-hosted Intel macOS runners (e.g. macos-13) are gone. One Apple Silicon runner builds a
  # fat/universal binary (aarch64 + x86_64) so Intel and Apple Silicon Macs get a single DMG/.app.
  build-macos:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build & package (macOS universal)
        run: yarn tauri:build -- --target universal-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/
            src-tauri/target/universal-apple-darwin/release/bundle/macos/
          if-no-files-found: warn
          retention-days: 14

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build & package (Linux)
        run: yarn tauri:build -- --bundles deb,appimage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-linux
          path: |
            src-tauri/target/release/bundle/deb/
            src-tauri/target/release/bundle/appimage/
          if-no-files-found: warn
          retention-days: 14

  release:
    needs:
      - build-windows
      - build-macos
      - build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            bundle-windows/**/*.msi
            bundle-windows/**/*.exe
            bundle-macos/**/*.dmg
            bundle-macos/**/*.app.tar.gz
            bundle-linux/**/*.AppImage
            bundle-linux/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
