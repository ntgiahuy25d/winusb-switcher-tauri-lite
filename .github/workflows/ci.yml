# Cross-platform build smoke test on every push/PR to main.
# Does NOT create GitHub Releases — see build.yml (runs on v* tags + release job).
name: CI (WinUSB Switcher Lite)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            label: linux
          - platform: windows-latest
            label: windows
          - platform: macos-latest
            label: macos

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build frontend + Tauri bundles (Linux)
        if: matrix.label == 'linux'
        run: yarn tauri:build -- --bundles deb,appimage

      - name: Build frontend + Tauri bundles (non-Linux)
        if: matrix.label != 'linux'
        run: yarn tauri:build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: winusb-switcher-${{ matrix.label }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: warn
